<div class="auth-page">
  <div class="auth-card-wrap">
    <div class="auth-heading">
      <div class="auth-title">Create an account</div>
      <p class="auth-subtitle">Join the community, share your recipes and save your favourites.</p>
    </div>
    <form (submit)="submit($event)" class="auth-form-card">
      @if (error) {
        <div class="form-error">{{ error }}</div>
      }
      <div class="form-field">
        <label class="form-label">Full name</label>
        <input class="form-input" type="text" [(ngModel)]="name" name="name" placeholder="Andrej Kirskyn" autofocus>
      </div>
      <div class="form-field">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" [(ngModel)]="username" name="username" placeholder="andrej-kirskyn">
      </div>
      <div class="form-field">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com">
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" [(ngModel)]="password" name="password" placeholder="Min. 8 characters">
      </div>
      <div class="form-field--xl">
        <label class="form-label">Confirm password</label>
        <input class="form-input" type="password" [(ngModel)]="confirm" name="confirm" placeholder="••••••••">
      </div>
      <button type="submit" class="form-submit" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Create account' }}
      </button>
    </form>
    <p class="auth-footer">
      Already have an account?
      <button class="link-btn" (click)="goTo('/login')">Log in</button>
    </p>
  </div>
</div>
