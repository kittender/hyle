<div class="auth-page">
  <div class="auth-card-wrap">
    <div class="auth-heading">
      <div class="auth-title">Welcome back</div>
      <p class="auth-subtitle">Log in to your Hylé account</p>
    </div>
    <form (submit)="submit($event)" class="auth-form-card">
      @if (error) {
        <div class="form-error">{{ error }}</div>
      }
      <div class="form-field--lg">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" autofocus>
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" [(ngModel)]="password" name="password" placeholder="••••••••">
      </div>
      <div class="forgot-wrap">
        <button type="button" class="link-btn" (click)="goTo('/forgot-password')">Forgot password?</button>
      </div>
      <button type="submit" class="form-submit" [disabled]="loading">
        {{ loading ? 'Logging in…' : 'Log in' }}
      </button>
    </form>
    <p class="auth-footer">
      Don't have an account?
      <button class="link-btn" (click)="goTo('/register')">Create one</button>
    </p>
  </div>
</div>
