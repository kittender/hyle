<div style="min-height:calc(100vh - 52px); display:flex; align-items:center; justify-content:center; background:var(--bg); padding:40px 16px;">
  <div style="width:100%; max-width:400px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-family:var(--script); font-size:36px; color:var(--gold); margin-bottom:8px;">Reset password</div>
      <p style="font-size:14px; color:var(--muted);">We'll send you a link to reset it</p>
    </div>
    <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px;">
      @if (sent) {
        <div style="text-align:center; padding:12px 0;">
          <div style="font-size:32px; margin-bottom:12px;">📬</div>
          <div style="font-size:15px; font-weight:600; color:var(--text); margin-bottom:8px;">Check your inbox</div>
          <p style="font-size:13px; color:var(--muted); line-height:1.6;">We sent a reset link to <strong>{{ email }}</strong>. It expires in 30 minutes.</p>
          <button class="link-btn" (click)="goTo('/login')" style="margin-top:20px; font-size:13px;">Back to login</button>
        </div>
      } @else {
        <form (submit)="submit($event)">
          <div style="margin-bottom:22px;">
            <label class="form-label">Email address</label>
            <input class="form-input" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" autofocus>
          </div>
          <button type="submit" class="form-submit" [disabled]="loading">
            {{ loading ? 'Sending…' : 'Send reset link' }}
          </button>
        </form>
      }
    </div>
    @if (!sent) {
      <p style="text-align:center; font-size:13px; color:var(--muted); margin-top:20px;">
        <button class="link-btn" (click)="goTo('/login')">← Back to login</button>
      </p>
    }
  </div>
</div>
