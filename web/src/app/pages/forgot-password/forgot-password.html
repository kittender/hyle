<div class="auth-page">
  <div class="auth-card-wrap">
    <div class="auth-heading">
      <div class="auth-title">Reset password</div>
      <p class="auth-subtitle">We'll send you a link to reset it</p>
    </div>
    <div class="auth-form-card">
      @if (sent) {
        <div class="confirm-state">
          <div class="confirm-icon">📬</div>
          <div class="confirm-title">Check your inbox</div>
          <p class="confirm-body">We sent a reset link to <strong>{{ email }}</strong>. It expires in 30 minutes.</p>
          <button class="link-btn confirm-back" (click)="goTo('/login')">Back to login</button>
        </div>
      } @else {
        <form (submit)="submit($event)">
          <div class="forgot-field">
            <label class="form-label">Email address</label>
            <input class="form-input" type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" autofocus>
          </div>
          <button type="submit" class="form-submit" [disabled]="loading">
            {{ loading ? 'Sending…' : 'Send reset link' }}
          </button>
        </form>
      }
    </div>
    @if (!sent) {
      <p class="auth-footer">
        <button class="link-btn" (click)="goTo('/login')">← Back to login</button>
      </p>
    }
  </div>
</div>
