<nav class="nav">
  <div class="nav-inner">
    <button class="nav-logo" (click)="goTo('/')">
      <img src="assets/golden-lotus-icon.png" alt="Hylé" style="height:32px; width:32px; object-fit:contain;">
      <span>Hylé</span>
    </button>
    <div style="display:flex; align-items:center; gap:2px; flex:1; margin-left:24px;">
      <button class="nav-link" [class.active]="isActive('/search') || currentPath === '/'" (click)="goTo('/search')">Browse</button>
      <button class="nav-link" [class.active]="isActive('/docs')" (click)="goTo('/docs')">Docs</button>
      <button class="nav-link" [class.active]="isActive('/enterprise')" (click)="goTo('/enterprise')">Enterprise</button>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <form (submit)="handleSearch($event)" style="display:flex; align-items:center;">
        <div style="position:relative;">
          <span style="position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; display:flex;">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3" stroke-linecap="round"/></svg>
          </span>
          <input [(ngModel)]="query" name="navSearch" placeholder="Search prints…" class="nav-search">
        </div>
      </form>

      @if (authService.isLoggedIn()) {
        <div class="nav-user-menu" style="position:relative;">
          <button
            (click)="toggleMenu()"
            style="display:flex; align-items:center; gap:7px; padding:3px 8px 3px 4px; border-radius:6px; border:1px solid transparent; transition:background 0.15s; cursor:pointer; background:transparent;"
            [style.background]="menuOpen() ? 'rgba(255,255,255,0.08)' : 'transparent'">
            <span style="width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,#c4982a,#5a7a3a); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0;">
              {{ authService.user()!.name.charAt(0).toUpperCase() }}
            </span>
            <span style="font-size:13px; color:rgba(255,255,255,0.8); font-weight:500;">{{ authService.user()!.username }}</span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="rgba(255,255,255,0.4)"><path d="M2 3.5l3 3 3-3" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" fill="none"/></svg>
          </button>
          @if (menuOpen()) {
            <div style="position:absolute; right:0; top:calc(100% + 6px); background:#fff; border:1px solid var(--border); border-radius:8px; width:190px; box-shadow:0 8px 24px rgba(0,0,0,0.12); z-index:200; overflow:hidden;">
              <div style="padding:10px 14px 8px; border-bottom:1px solid var(--border);">
                <div style="font-size:13px; font-weight:600; color:var(--text);">{{ authService.user()!.name }}</div>
                <div style="font-size:12px; color:var(--muted); margin-top:1px;">{{ authService.user()!.email }}</div>
              </div>
              <button (click)="goTo('/profile')" class="nav-dropdown-item">My profile</button>
              <button (click)="goTo('/profile/public')" class="nav-dropdown-item">Public profile</button>
              <div style="border-top:1px solid var(--border); padding:4px 0;">
                <button (click)="logout()" class="nav-dropdown-item" style="color:#c0392b;">Log out</button>
              </div>
            </div>
          }
        </div>
      } @else {
        <button class="link-btn-light" (click)="goTo('/login')">Log in</button>
        <button class="btn-primary" (click)="goTo('/register')">Register</button>
      }
    </div>
  </div>
</nav>
