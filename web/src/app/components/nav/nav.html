<nav class="nav">
  <div class="nav-inner">
    <button class="nav-logo" (click)="goTo('/')">
      <img src="assets/golden-lotus-icon.png" alt="Hylé">
      <span>Hylé</span>
    </button>
    <div class="nav-links">
      <button class="nav-link" [class.active]="isActive('/search') || currentPath === '/'" (click)="goTo('/search')">Browse</button>
      <button class="nav-link" [class.active]="isActive('/docs')" (click)="goTo('/docs')">Docs</button>
      <button class="nav-link" [class.active]="isActive('/enterprise')" (click)="goTo('/enterprise')">Enterprise</button>
    </div>
    <div class="nav-actions">
      <form (submit)="handleSearch($event)" class="nav-search-form">
        <div class="nav-search-wrap">
          <span class="nav-search-icon">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3" stroke-linecap="round"/></svg>
          </span>
          <input [(ngModel)]="query" name="navSearch" placeholder="Search blueprints…" class="nav-search">
        </div>
      </form>

      @if (authService.isLoggedIn()) {
        <div class="nav-user-menu">
          <button
            (click)="toggleMenu()"
            class="nav-user-btn"
            [class.active]="menuOpen()">
            <span class="nav-avatar">
              {{ authService.user()!.name.charAt(0).toUpperCase() }}
            </span>
            <span class="nav-username">{{ authService.user()!.username }}</span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="rgba(255,255,255,0.4)"><path d="M2 3.5l3 3 3-3" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" fill="none"/></svg>
          </button>
          @if (menuOpen()) {
            <div class="nav-dropdown">
              <div class="nav-dropdown__header">
                <div class="nav-dropdown__name">{{ authService.user()!.name }}</div>
                <div class="nav-dropdown__email">{{ authService.user()!.email }}</div>
              </div>
              <button (click)="goTo('/profile')" class="nav-dropdown-item">My profile</button>
              <button (click)="goTo('/profile/public')" class="nav-dropdown-item">Public profile</button>
              <div class="nav-dropdown__section">
                <button (click)="logout()" class="nav-dropdown-item" style="color:#c0392b;">Log out</button>
              </div>
            </div>
          }
        </div>
      } @else {
        <button class="link-btn-light" (click)="goTo('/login')">Log in</button>
        <button class="btn-primary" (click)="goTo('/register')">Register</button>
      }
    </div>
  </div>
</nav>
